name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Lint gate: fails the PR on any ESLint *error*. Warnings (tracked
      # burn-down debt — the established `(supabase as any)` cast pattern,
      # underscore-prefixed unused vars, and cosmetic unescaped entities are
      # downgraded to "warn" in .eslintrc.json) don't block. The gate exists
      # to catch NEW structural errors (server→client boundary mistakes,
      # parse errors, banned imports) before they reach a preview deploy.
      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

  # Foundation smoke (no auth): boots the built app and asserts public pages
  # render + protected pages redirect to /login (auth wall intact, not a 500).
  # Needs the PUBLIC Supabase pair so middleware's getUser() can run; these are
  # publishable values, not secrets-in-the-security-sense, but live in repo
  # secrets so the URL/key aren't committed. Add them under
  # Settings → Secrets and variables → Actions, then mark `smoke` a required
  # check. Until then this job will fail at boot (missing env) — that's
  # expected; `verify` is the gate that works immediately.
  smoke:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Start app + smoke
        run: |
          npm run start -- -p 3001 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001/login >/dev/null 2>&1 && break
            sleep 2
          done
          export SMOKE_BASE_URL=http://localhost:3001
          npm run smoke

  # Integration: boots a throwaway local Supabase (Docker), replays ALL
  # committed migrations onto an empty database (a clean `db reset` — this alone
  # catches migrations that don't reconstruct prod, e.g. a column ALTERed but
  # never CREATEd, or an enum value used in the same transaction that added it),
  # then runs the RLS tenant-isolation suite against that canonical schema — the
  # policy-level checks the unit lane can't make. Hard requirement before the
  # first external HQ user (every change then passes the RLS gate).
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      # ubuntu-latest ships Docker. Exclude services the suite doesn't need to
      # cut boot time.
      - name: Boot local Supabase
        run: supabase start -x edge-runtime,imgproxy,studio,logflare,vector

      # Deterministic clean replay of every migration onto an empty DB. Fails the
      # job on any replay error.
      - name: Replay migrations (clean)
        run: supabase db reset

      # Map the local stack credentials into the names the RLS helpers expect
      # (src/tests/rls/helpers.ts + the suites).
      - name: Export local stack credentials
        run: |
          eval "$(supabase status -o env | grep -E '^[A-Z_]+=')"
          {
            echo "SUPABASE_TEST_URL=$API_URL"
            echo "SUPABASE_TEST_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_TEST_SERVICE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: RLS integration suite
        run: npm run test:rls

      - name: Stop local Supabase
        if: always()
        run: supabase stop
